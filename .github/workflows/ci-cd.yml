jobs:
  ci-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 pip-audit

    - name: Ejecutar Linter (Flake8)
      run: python -m flake8 src/ tests/

    - name: Auditoría de Dependencias (Seguridad)
      # Este comando escanea tu requirements.txt buscando librerías hackeadas o viejas
      run: pip-audit -r requirements.txt

    - name: Ejecutar Tests Unitarios (Pytest)
      run: python -m pytest -v --junitxml=junit/test-results.xml

    - name: Guardar Reportes como Artefactos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reportes-ci-build
        path: |
          junit/test-results.xml