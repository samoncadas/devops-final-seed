name: DevOps Final - CI Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 pip-audit

    - name: Ejecutar Linter (Flake8)
      run: python -m flake8 src/ tests/

    - name: Auditoría de Dependencias (Seguridad)
      run: pip-audit -r requirements.txt
      continue-on-error: true

    - name: Ejecutar Tests Unitarios (Pytest)
      run: python -m pytest -v --junitxml=junit/test-results.xml

    - name: Guardar Reportes como Artefactos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reportes-ci-build
        path: |
          junit/test-results.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci-validation
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Extraer metadatos de la imagen
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=sha,prefix=sha-,format=short
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Iniciar sesión en GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Construir y publicar imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
