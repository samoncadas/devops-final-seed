name: DevOps Final - CI Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de código
      uses: actions/checkout@v4

    - name: Configurar Python 3.11
      uses: actions/actions-setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Ejecutar Linter (Flake8)
        # Este comando valida el formato en la nube de la misma forma que lo hiciste local
      run: python -m flake8 src/ tests/

    - name: Ejecutar Tests Unitarios (Pytest)
      run: python -m pytest -v --junitxml=junit/test-results.xml

    - name: Guardar Reportes como Artefactos
      uses: actions/upload-artifact@v4
      if: always() # Guarda reportes (Punto 8) aunque algo falle
      with:
        name: reportes-ci-build
        path: |
          junit/test-results.xml